name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: write

jobs:
  ci:
    uses: Taure/erlang-ci/.github/workflows/ci.yml@v2
    with:
      enable-ct: true

  release:
    needs: ci
    if: ${{ github.event_name == 'push' }}
    uses: Taure/erlang-ci/.github/workflows/release.yml@v2
    secrets: inherit
